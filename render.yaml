# Render Web Service 배포 설정
services:
  - type: web
    name: wint365-login
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    plan: starter  # 24시간 운영을 위한 유료 플랜
    region: oregon
    branch: main
    rootDir: .
    autoDeploy: true
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PORT
        value: 10000